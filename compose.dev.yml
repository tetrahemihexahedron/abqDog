services:
  frontend:
    init: true
    build:
      context: ./frontend
      target: dev
    command: ["pnpm", "dev", "--host", "0.0.0.0"]
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules

  backend:
    build:
      context: ./backend
      target: dev
    restart: "no"
    volumes:
      - ./backend:/var/www/backend
      - backend-vendor:/var/www/backend/vendor

  web:
    build: !reset null
    image: caddy:2.11.4-alpine
    restart: "no"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./web/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - ./backend/public:/var/www/backend/public:ro

volumes:
  frontend-node-modules:
  backend-vendor:
