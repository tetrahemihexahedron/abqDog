services:
  backend:
    init: true
    restart: unless-stopped
    build:
      context: ./backend
      target: deploy

  web:
    init: true
    restart: unless-stopped
    build:
      context: .
      dockerfile: web/Dockerfile
      target: deploy
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./backend/public:/var/www/backend/public:ro

networks:
  default:
    name: abqdog
