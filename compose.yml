services:
  backend:
    build:
      context: ./backend
      target: deploy
    volumes:
      - ./backend/php.ini:/usr/local/etc/php/conf.d/zz-abqdog.ini:ro

  web:
    build:
      context: ./web
      dockerfile: web/Dockerfile
      target: deploy
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./backend/public:/var/www/backend/public:ro
