services:
  backend:
    init: true
    restart: unless-stopped
    build:
      context: ./backend
      target: deploy
    environment:
      DATABASE_PATH: ${DATABASE_PATH:?DATABASE_PATH}
    volumes:
      - sqlite-data:/data

  web:
    init: true
    restart: unless-stopped
    build:
      context: .
      dockerfile: web/Dockerfile
      target: deploy
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./backend/public:/var/www/backend/public:ro

volumes:
  sqlite-data:

networks:
  default:
    name: abqdog
