services:
  frontend:
    build:
      context: ./frontend
      target: deploy
    volumes:
      - frontend-dist:/app/dist
    command: ["true"]

  caddy:
    image: caddy:2.10.2-alpine
    depends_on:
      frontend:
        condition: service_completed_successfully
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - frontend-dist:/srv/www:ro

volumes:
  frontend-dist:
